#foc
name: Build

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the source code repository only
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      # 2. Set up standard JDK compiler environment
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Handle Android compilation assets
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Compile the plugins using the runner's native global gradle tool
      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          
          # Inject version metadata bypass flag natively
          export GRADLE_OPTS="-Dorg.gradle.project.kotlinOptions.freeCompilerArgs=-Xskip-metadata-version-check"
          
          gradle make makePluginsJson
          
          # Create an isolated staging folder outside the source stream
          mkdir -p $GITHUB_WORKSPACE/staging_out
          cp **/build/*.cs3 $GITHUB_WORKSPACE/staging_out/ || true
          cp build/plugins.json $GITHUB_WORKSPACE/staging_out/ || true

      # 5. Clean setup to initialize or update the builds branch dynamically
      - name: Deploy to Builds Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a completely fresh, empty directory for the branch deploy
          mkdir -p $GITHUB_WORKSPACE/deploy_env
          cd $GITHUB_WORKSPACE/deploy_env
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git init
          
          # Check out a totally independent history stream named builds
          git checkout -b builds
          
          # Bring the newly compiled files over from the staging folder
          cp -r $GITHUB_WORKSPACE/staging_out/* . || true
          
          git add .
          
          # Set up authentication remote tracking URL string
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          
          # Commit and force-overwrite the branch target upstream safely
          git commit -m "Build $GITHUB_SHA" || exit 0
          git push origin builds --force
