name: Build

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      # FIXED: Upgraded Java to 21 to natively support the bcprov-jdk18on runtime requirements
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Stable Gradle Distribution
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2.1'
          cache-disabled: true

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          
          rm -rf .gradle/
          rm -rf gradle/wrapper/
          rm -f gradlew
          rm -f gradlew.bat
          
          export GRADLE_OPTS="-Dorg.gradle.project.kotlinOptions.freeCompilerArgs=-Xskip-metadata-version-check -Dorg.gradle.welcome=never"
          
          # Kept the localized -g flag to maintain a clean workspace environment
          gradle -g .gradle_home clean make makePluginsJson --no-configuration-cache --no-build-cache --rerun-tasks
          
          mkdir -p $GITHUB_WORKSPACE/staging_out
          cp **/build/*.cs3 $GITHUB_WORKSPACE/staging_out/ || true
          cp build/plugins.json $GITHUB_WORKSPACE/staging_out/ || true

      - name: Deploy to Builds Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/deploy_env
          cd $GITHUB_WORKSPACE/deploy_env
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git init
          
          git checkout -b builds
          cp -r $GITHUB_WORKSPACE/staging_out/* . || true
          git add .
          
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git commit -m "Build $GITHUB_SHA" || exit 0
          git push origin builds --force
