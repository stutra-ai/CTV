name: Build

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
  # Allows manual runs from the GitHub Actions dashboard tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
          # Safe fallback to prevent crashes if the branch is fresh/unseeded
          fallback-to-no-history: false 

      - name: Clean old builds
        run: |
          # Use -f to prevent errors if there are no existing .cs3 files to clear
          rm -f $GITHUB_WORKSPACE/builds/*.cs3

      # Using updated, stable versions of setup actions
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          
          # Injecting the language compilation flag globally into the gradle toolchain environment
          export GRADLE_OPTS="-Dorg.gradle.project.kotlinOptions.freeCompilerArgs=-Xskip-metadata-version-check"
          
          # Bypasses the broken local wrapper script binary completely
          gradle make makePluginsJson
          
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/ || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds/ || true

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          
          # Commit updates safely without hanging on empty changes
          git commit --amend -m "Build $GITHUB_SHA" || git commit -m "Build $GITHUB_SHA" || exit 0
          
          # Force update the tracking stream
          git push origin builds --force
