#new-permissions
name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
      - '.github/workflows/**'
      - 'repo.json'
      - 'DomainCheck.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: "src"

      # FIXED: Changed branch fetching to avoid crashing if the branch is missing
      - name: Checkout or Create builds Branch
        uses: actions/checkout@v4
        with:
          ref: "main" # Fallback to check out a valid starting head
          path: "builds"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          
          export GRADLE_OPTS="-Dorg.gradle.project.kotlinOptions.freeCompilerArgs=-Xskip-metadata-version-check"
          
          ./gradlew make makePluginsJson
          
          # Clean destination safely before staging assets
          rm -rf $GITHUB_WORKSPACE/builds/*
          cp -r **/build/*.cs3 $GITHUB_WORKSPACE/builds/ || true
          cp -r build/plugins.json $GITHUB_WORKSPACE/builds/ || true

      - name: Push builds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Force create an isolated, clean builds stream if tracking breaks
          git checkout --orphan temp_builds || git checkout builds
          git rm -rf . --ignore-unmatch
          
          # Move compiled binaries back in
          cp -r $GITHUB_WORKSPACE/src/**/build/*.cs3 . || true
          cp -r $GITHUB_WORKSPACE/src/build/plugins.json . || true
          
          git add .
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git commit -m "Build $GITHUB_SHA" || exit 0
          
          # Overwrite or seed the branch upstream securely
          git push origin HEAD:builds --force
